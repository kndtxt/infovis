<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Biblioteca Musical Digital</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #ffb76b;
      color: #f5f7fa;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 10px;
    }

    p.subtitle {

      box-shadow: 0 10px 30px rgba(0,0,0,0.4);

<body>

  <div class="container">

    </p>

    <div class="chart-card">
      <div class="flourish-embed flourish-chart" data-src="visualisation/28267933">

        <noscript>
          <img src="https://public.flourish.studio/visualisation/28267933/thumbnail" width="100%" alt="visualization" />
